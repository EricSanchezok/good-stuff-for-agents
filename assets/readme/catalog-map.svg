  <g font-family="ui-sans-serif, system-ui">
    <text x="74" y="92" fill="#FFF8E7" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700">Browse the living system</text>
    <text x="76" y="128" fill="#BFB7A8" font-size="16">Start from packs when you know the job. Dive into skills, sources, and domains when you want the evidence.</text>

    <g transform="translate(80 190)">
      <rect width="270" height="170" rx="30" fill="#FFF7DF"/>
      <text x="30" y="56" fill="#08090D" font-size="24" font-weight="850">Packs</text>
      <text x="30" y="92" fill="#4A4032" font-size="15">Ready-to-use skill sets for real agent workflows.</text>
      <text x="30" y="136" fill="#08090D" font-size="14" font-weight="800">Start here →</text>
    </g>

    <g transform="translate(402 190)">
      <rect width="270" height="170" rx="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="30" y="56" fill="#FFF7DF" font-size="24" font-weight="850">Skills</text>
      <text x="30" y="92" fill="#BFB7A8" font-size="15">Individual capabilities with evidence and risk notes.</text>
      <text x="30" y="136" fill="#FFF7DF" font-size="14" font-weight="800">Inspect tools →</text>
    </g>

    <g transform="translate(724 190)">
      <rect width="270" height="170" rx="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="30" y="56" fill="#FFF7DF" font-size="24" font-weight="850">Sources</text>
      <text x="30" y="92" fill="#BFB7A8" font-size="15">Where every catalog entry came from.</text>
      <text x="30" y="136" fill="#FFF7DF" font-size="14" font-weight="800">Trace origin →</text>
    </g>

    <g transform="translate(1046 190)">
      <rect width="270" height="170" rx="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="30" y="56" fill="#FFF7DF" font-size="24" font-weight="850">Domains</text>
      <text x="30" y="92" fill="#BFB7A8" font-size="15">Browse by problem space and coverage.</text>
      <text x="30" y="136" fill="#FFF7DF" font-size="14" font-weight="800">Find a lane →</text>
